<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adam Liu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#e8e4dc;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif}
#c{display:block;width:100vw;height:100vh;cursor:grab}
#c:active{cursor:grabbing}
#hud{position:fixed;top:28px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:0.14em;color:rgba(40,30,20,0.4);text-transform:uppercase;pointer-events:none;user-select:none}
#hint{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:0.06em;color:rgba(40,30,20,0.28);pointer-events:none;user-select:none;text-align:center;transition:opacity 0.4s}
#homebtn{position:fixed;bottom:24px;right:24px;width:38px;height:38px;border-radius:50%;background:rgba(255,253,250,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid rgba(40,30,20,0.1);color:rgba(40,30,20,0.45);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.07);transition:color 0.15s;z-index:5}
#homebtn:hover{color:rgba(40,30,20,0.9)}
#card{position:fixed;top:0;right:0;width:40%;max-width:420px;height:100%;background:rgba(255,253,250,0.93);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border-left:0.5px solid rgba(40,30,20,0.08);padding:56px 40px 40px;opacity:0;pointer-events:none;transform:translateX(24px);transition:opacity 0.36s cubic-bezier(0.22,1,0.36,1),transform 0.36s cubic-bezier(0.22,1,0.36,1);display:flex;flex-direction:column;justify-content:center;box-shadow:-8px 0 32px rgba(0,0,0,0.05)}
#card.show{opacity:1;pointer-events:auto;transform:translateX(0)}
#card-close{position:absolute;top:20px;right:20px;background:none;border:none;color:rgba(40,30,20,0.28);font-size:20px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:color 0.15s,background 0.15s}
#card-close:hover{color:rgba(40,30,20,0.8);background:rgba(40,30,20,0.06)}
#card-tag{font-size:10px;letter-spacing:0.12em;color:rgba(40,30,20,0.35);text-transform:uppercase;margin-bottom:14px}
#card-title{font-size:26px;font-weight:500;margin-bottom:6px;letter-spacing:-0.02em;color:#1a1410;line-height:1.2}
#card-date{font-size:12px;color:rgba(40,30,20,0.35);margin-bottom:20px;letter-spacing:0.04em}
#card-desc{font-size:14px;color:rgba(40,30,20,0.62);line-height:1.75}
#loading{position:fixed;inset:0;background:#e8e4dc;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;transition:opacity 0.5s;z-index:10}
#loading.hide{opacity:0;pointer-events:none}
#loading-text{font-size:11px;letter-spacing:0.14em;color:rgba(40,30,20,0.35);text-transform:uppercase}
#loading-bar{width:100px;height:1px;background:rgba(40,30,20,0.12);overflow:hidden}
#loading-fill{height:100%;background:rgba(40,30,20,0.4);width:0%;transition:width 0.25s}
@media(max-width:600px){
  #card{width:100%;border-left:none;border-top:0.5px solid rgba(40,30,20,0.08);height:auto;top:auto;bottom:0;padding:28px 24px 40px;transform:translateY(24px);justify-content:flex-start}
  #card.show{transform:translateY(0)}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">Adam Liu</div>
<div id="hint">Left drag · Scroll to move · Right drag to pan · Click objects</div>
<button id="homebtn" title="Return to overview">⌂</button>
<div id="card">
  <button id="card-close">×</button>
  <div id="card-tag"></div>
  <div id="card-title"></div>
  <div id="card-date"></div>
  <div id="card-desc"></div>
</div>
<div id="loading">
  <div id="loading-text">Loading</div>
  <div id="loading-bar"><div id="loading-fill"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>
<script>
// ── Data ────────────────────────────────────────────────────────────
const ITEMS=[
  {id:'m1',type:'model',title:'Tim Hortons Cup',date:'2024.11',desc:'Hand-modelled in Blender. My first attempt at beverage packaging.',color:0xc8452a,roughness:0.4,metalness:0.05,pos:[0,0,0]},
  {id:'m2',type:'model',title:'Raffle Ticket',date:'2025.01',desc:'A vintage-style raffle ticket. UV-unwrapped across a single wide texture.',color:0xd4a04a,roughness:0.6,metalness:0.0,pos:[320,0,80]},
  {id:'p1',type:'photo',title:'Calgary Winter',date:'2025.02',desc:'The Rockies from the east side. Still gets me every time.',color:0x8aacc8,pos:[-300,0,-160]},
  {id:'p2',type:'photo',title:'Workshop',date:'2024.12',desc:'Late night coding session. Next.js, Neon, GSAP.',color:0x9a8aba,pos:[160,0,-320]},
  {id:'v1',type:'video',title:'Blender Timelapse',date:'2025.03',desc:'Speed-modelling the ticket card.',color:0x5a9a7a,pos:[-180,0,260]},
  {id:'n1',type:'note',title:'Wabi-Sabi',date:'ongoing',desc:'侘寂 — beauty in imperfection.',color:0xb5a890,roughness:0.85,metalness:0.0,pos:[380,0,-60]},
  {id:'n2',type:'note',title:'IEC — Visitor Record',date:'2025.05',desc:'Waiting game. ~300 days. Calgary continues.',color:0x95a586,roughness:0.7,metalness:0.0,pos:[-340,0,40]},
  {id:'m3',type:'model',title:'Voyage Artifact No.1',date:'2024.10',desc:'3D-scanned travel collectible via Scaniverse.',color:0xba7a4a,roughness:0.45,metalness:0.15,pos:[60,0,280]},
];

// ── Mobile detection ────────────────────────────────────────────────
const isMobile=/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||('ontouchstart' in window&&window.innerWidth<1024);

// compute scene centroid
const CX=ITEMS.reduce((s,i)=>s+i.pos[0],0)/ITEMS.length;
const CZ=ITEMS.reduce((s,i)=>s+i.pos[2],0)/ITEMS.length;
const FLOOR_Y=-80;
const MIN_CAM_Y=FLOOR_Y+150;

// ── Helpers ─────────────────────────────────────────────────────────
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;

function lookAngles(px,py,pz,lx,ly,lz){
  const dx=lx-px,dy=ly-py,dz=lz-pz;
  return{
    yaw:Math.atan2(-dx,-dz),
    pitch:Math.atan2(dy,Math.sqrt(dx*dx+dz*dz))
  };
}

// ── Default camera ───────────────────────────────────────────────────
const HOME_POS={x:CX,y:450,z:CZ+700};
const HOME_ANGLES=lookAngles(HOME_POS.x,HOME_POS.y,HOME_POS.z,CX,0,CZ);

// ── Camera state ─────────────────────────────────────────────────────
const CAM={
  x:HOME_POS.x, y:HOME_POS.y, z:HOME_POS.z,
  tx:HOME_POS.x,ty:HOME_POS.y,tz:HOME_POS.z,
  yaw:HOME_ANGLES.yaw,   pitch:HOME_ANGLES.pitch,
  tyaw:HOME_ANGLES.yaw,  tpitch:HOME_ANGLES.pitch,
};

// ── Zoom-in animation state ─────────────────────────────────────────
CAM.zooming=false;
CAM.zoomStartTime=0;
CAM.zoomDuration=1.3;
CAM.zoomFrom={x:0,y:0,z:0,yaw:0,pitch:0};
CAM.zoomTo={x:0,y:0,z:0,yaw:0,pitch:0};
function easeOutExpo(t){return t>=1?1:1-Math.pow(2,-10*t);}

function fwd(){
  return new THREE.Vector3(
    -Math.sin(CAM.yaw)*Math.cos(CAM.pitch),
    Math.sin(CAM.pitch),
    -Math.cos(CAM.yaw)*Math.cos(CAM.pitch)
  );
}
function right(){return new THREE.Vector3(Math.cos(CAM.yaw),0,-Math.sin(CAM.yaw));}

// ── Renderer ─────────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(isMobile?Math.min(window.devicePixelRatio,1):Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.0;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.physicallyCorrectLights=true;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0xe8e4dc);
scene.fog=new THREE.Fog(0xe8e4dc,900,2200);

const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,10,4000);

// ── HDRI ─────────────────────────────────────────────────────────────
const pmrem=new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
new THREE.RGBELoader().setDataType(THREE.UnsignedByteType)
  .load('https://cdn.jsdelivr.net/gh/pmndrs/drei-assets@master/hdri/studio_small_09_1k.hdr',
    tex=>{scene.environment=pmrem.fromEquirectangular(tex).texture;tex.dispose();pmrem.dispose();hideLoading();},
    xhr=>{document.getElementById('loading-fill').style.width=(xhr.loaded/xhr.total*100)+'%';},
    ()=>hideLoading());

function hideLoading(){setTimeout(()=>document.getElementById('loading').classList.add('hide'),200);}

// ── Lights ───────────────────────────────────────────────────────────
const sun=new THREE.DirectionalLight(0xfff0d8,2.5);
sun.position.set(300,500,200);
sun.castShadow=true;
sun.shadow.mapSize.set(isMobile?512:2048,isMobile?512:2048);
sun.shadow.camera.left=sun.shadow.camera.bottom=-700;
sun.shadow.camera.right=sun.shadow.camera.top=700;
sun.shadow.camera.near=10;sun.shadow.camera.far=2000;
sun.shadow.radius=12;sun.shadow.bias=-0.0005;
scene.add(sun);
const fill=new THREE.DirectionalLight(0xc8d8e8,0.6);
fill.position.set(-200,300,-100);scene.add(fill);

// ── Floor ────────────────────────────────────────────────────────────
const floor=new THREE.Mesh(
  new THREE.PlaneGeometry(5000,5000),
  new THREE.MeshStandardMaterial({color:0xe8e4dc,roughness:0.85,metalness:0})
);
floor.rotation.x=-Math.PI/2;floor.position.y=FLOOR_Y;floor.receiveShadow=true;
scene.add(floor);

// ── Dust ─────────────────────────────────────────────────────────────
const dg=new THREE.BufferGeometry();
const dustCount=isMobile?150:400;
const dp=new Float32Array(dustCount*3);
for(let i=0;i<dustCount;i++){dp[i*3]=(Math.random()-0.5)*1800;dp[i*3+1]=Math.random()*500;dp[i*3+2]=(Math.random()-0.5)*1200;}
dg.setAttribute('position',new THREE.BufferAttribute(dp,3));
scene.add(new THREE.Points(dg,new THREE.PointsMaterial({color:0x9a8a70,size:1.3,sizeAttenuation:true,opacity:0.28,transparent:true})));

// ── Pedestal ─────────────────────────────────────────────────────────
const PED_H=100;
const pedestal=new THREE.Mesh(
  new THREE.BoxGeometry(80,PED_H,80),
  new THREE.MeshStandardMaterial({color:0xf0ece4,roughness:0.45,metalness:0,envMapIntensity:0.5})
);
pedestal.castShadow=true;pedestal.receiveShadow=true;
pedestal.position.y=-9999;
scene.add(pedestal);
pedestal.add(new THREE.LineSegments(
  new THREE.EdgesGeometry(pedestal.geometry),
  new THREE.LineBasicMaterial({color:0xc8c0b4,opacity:0.3,transparent:true})
));
let pedTargetY=-9999;

// ── Objects ──────────────────────────────────────────────────────────
const objects=[];
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();

ITEMS.forEach(item=>{
  let mesh;
  const col=new THREE.Color(item.color);
  const std=(r,m)=>new THREE.MeshStandardMaterial({color:col,roughness:r,metalness:m,envMapIntensity:1.0});

  if(item.type==='model'){
    const pts=[];
    for(let i=0;i<=24;i++){const t=i/24;pts.push(new THREE.Vector2(Math.sin(t*Math.PI)*22+6,t*52-26));}
    const geo=new THREE.LatheGeometry(pts,isMobile?32:64);geo.computeVertexNormals();
    mesh=new THREE.Mesh(geo,std(item.roughness??0.4,item.metalness??0.05));
  }else if(item.type==='photo'){
    mesh=new THREE.Mesh(new THREE.PlaneGeometry(88,60),std(0.5,0));
    mesh.material.side=THREE.DoubleSide;
    const brd=new THREE.Mesh(new THREE.PlaneGeometry(94,66),new THREE.MeshStandardMaterial({color:0xfaf6ec,roughness:0.7,side:THREE.DoubleSide}));
    brd.position.z=-0.5;mesh.add(brd);
  }else if(item.type==='video'){
    mesh=new THREE.Mesh(new THREE.PlaneGeometry(96,60),std(0.5,0));
    mesh.material.side=THREE.DoubleSide;
    const ring=new THREE.Mesh(new THREE.RingGeometry(9,12,48),new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.DoubleSide,opacity:0.5,transparent:true}));
    ring.position.z=1;mesh.add(ring);
  }else{
    const geo=new THREE.SphereGeometry(20,isMobile?24:48,isMobile?24:48);geo.computeVertexNormals();
    mesh=new THREE.Mesh(geo,std(item.roughness??0.6,item.metalness??0));
  }

  mesh.position.set(item.pos[0], FLOOR_Y+(item.type==='model'?26:item.type==='note'?20:30), item.pos[2]);
  mesh.rotation.y=Math.random()*Math.PI*2;
  mesh.castShadow=true;mesh.receiveShadow=true;
  mesh.userData=item;
  scene.add(mesh);objects.push(mesh);

  const blob=new THREE.Mesh(new THREE.CircleGeometry(30,32),new THREE.MeshBasicMaterial({color:0x000000,opacity:0.1,transparent:true,depthWrite:false}));
  blob.rotation.x=-Math.PI/2;blob.position.set(item.pos[0],FLOOR_Y+0.5,item.pos[2]);
  scene.add(blob);
});

// ── Connection lines ─────────────────────────────────────────────────
const lmat=new THREE.LineBasicMaterial({color:0xb0a890,opacity:0.18,transparent:true});
for(let i=0;i<objects.length;i++)
  for(let j=i+1;j<objects.length;j++)
    if(objects[i].position.distanceTo(objects[j].position)<420)
      scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([objects[i].position.clone(),objects[j].position.clone()]),lmat));

// ── Focus state ──────────────────────────────────────────────────────
let focusedObj=null;

function focusOn(obj){
  focusedObj=obj;
  const p=obj.userData.pos;
  const objY=obj.userData._baseY;

  const dx=p[0]-CAM.x, dz=p[2]-CAM.z;
  const angle=Math.atan2(dx,dz);
  const d=240;
  const tx=p[0]+Math.sin(angle)*d;
  const tz=p[2]+Math.cos(angle)*d;
  const ty=Math.max(objY+80,MIN_CAM_Y);
  const leftOffset=80;
  const r=right();
  const finalX=tx+r.x*leftOffset;
  const finalZ=tz+r.z*leftOffset;
  const finalY=ty;
  const a=lookAngles(finalX,finalY,finalZ,p[0],objY,p[2]);
  let finalYaw=a.yaw;
  while(finalYaw-CAM.yaw>Math.PI)finalYaw-=Math.PI*2;
  while(finalYaw-CAM.yaw<-Math.PI)finalYaw+=Math.PI*2;
  const finalPitch=clamp(a.pitch,-1.0,0.1);

  CAM.zoomFrom={x:CAM.x,y:CAM.y,z:CAM.z,yaw:CAM.yaw,pitch:CAM.pitch};
  CAM.zoomTo={x:finalX,y:finalY,z:finalZ,yaw:finalYaw,pitch:finalPitch};
  CAM.zooming=true;
  CAM.zoomStartTime=clock.getElapsedTime();
  CAM.zoomDuration=isMobile?0.9:1.3;

  CAM.tx=finalX;CAM.ty=finalY;CAM.tz=finalZ;
  CAM.tyaw=finalYaw;CAM.tpitch=finalPitch;

  pedestal.position.x=p[0];
  pedestal.position.z=p[2];
  pedTargetY=FLOOR_Y+PED_H/2;

  document.getElementById('hint').style.opacity='0';
  showCard(obj.userData);
}

function resetFocus(){
  focusedObj=null;
  pedTargetY=-9999;
  document.getElementById('hint').style.opacity='1';
  document.getElementById('card').classList.remove('show');
}

function goHome(){
  CAM.tx=HOME_POS.x;CAM.ty=HOME_POS.y;CAM.tz=HOME_POS.z;
  CAM.tyaw=HOME_ANGLES.yaw;CAM.tpitch=HOME_ANGLES.pitch;
  while(CAM.tyaw-CAM.yaw>Math.PI)CAM.tyaw-=Math.PI*2;
  while(CAM.tyaw-CAM.yaw<-Math.PI)CAM.tyaw+=Math.PI*2;
  resetFocus();
}

// ── Card ─────────────────────────────────────────────────────────────
const cardEl=document.getElementById('card');
document.getElementById('card-close').addEventListener('click',resetFocus);
document.getElementById('homebtn').addEventListener('click',goHome);

function showCard(item){
  const icons={model:'◎ model',photo:'▣ photo',video:'▶ video',note:'◆ note'};
  document.getElementById('card-tag').textContent=icons[item.type]||item.type;
  document.getElementById('card-title').textContent=item.title;
  document.getElementById('card-date').textContent=item.date;
  document.getElementById('card-desc').textContent=item.desc;
  cardEl.classList.add('show');
}

// ── Input ────────────────────────────────────────────────────────────
let btn=-1,pMx=0,pMy=0,dragDist=0;
canvas.addEventListener('mousedown',e=>{e.preventDefault();btn=e.button;pMx=e.clientX;pMy=e.clientY;dragDist=0;});
window.addEventListener('mouseup',()=>btn=-1);
window.addEventListener('mousemove',e=>{
  if(btn<0)return;
  const dx=e.clientX-pMx,dy=e.clientY-pMy;
  dragDist+=Math.abs(dx)+Math.abs(dy);
  if(btn===0){
    const r=right();const spd=0.5;
    CAM.tx-=r.x*dx*spd;CAM.tz-=r.z*dx*spd;
    CAM.ty=clamp(CAM.ty+dy*spd,MIN_CAM_Y,2000);
  }else if(btn===1||btn===2){
    CAM.tyaw-=dx*0.004;
    CAM.tpitch=clamp(CAM.tpitch-dy*0.004,-1.0,0.1);
  }
  pMx=e.clientX;pMy=e.clientY;
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=fwd();const spd=0.7;
  CAM.tx-=f.x*e.deltaY*spd;
  CAM.ty=clamp(CAM.ty-f.y*e.deltaY*spd,MIN_CAM_Y,2000);
  CAM.tz-=f.z*e.deltaY*spd;
},{passive:false});

// Touch
let lPin=0,tDist=0;
canvas.addEventListener('touchstart',e=>{e.preventDefault();tDist=0;
  if(e.touches.length===1){pMx=e.touches[0].clientX;pMy=e.touches[0].clientY;}
  if(e.touches.length===2)lPin=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();
  if(e.touches.length===1){
    const dx=e.touches[0].clientX-pMx,dy=e.touches[0].clientY-pMy;
    tDist+=Math.abs(dx)+Math.abs(dy);
    CAM.tyaw-=dx*0.005;CAM.tpitch=clamp(CAM.tpitch-dy*0.005,-1.0,0.1);
    pMx=e.touches[0].clientX;pMy=e.touches[0].clientY;
  }
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const f=fwd();const spd=1.2;
    CAM.tx+=f.x*(d-lPin)*spd;CAM.tz+=f.z*(d-lPin)*spd;
    lPin=d;
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{
  if(e.changedTouches.length===1&&e.touches.length===0&&tDist<8)
    doClick(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
});
canvas.addEventListener('click',e=>{if(dragDist<5)doClick(e.clientX,e.clientY);});

function doClick(cx,cy){
  mouse.x=(cx/window.innerWidth)*2-1;
  mouse.y=-(cy/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(objects,true);
  if(hits.length){
    let o=hits[0].object;while(o&&!o.userData?.id)o=o.parent;
    if(o?.userData?.id){focusedObj===o?resetFocus():focusOn(o);}
  }else if(focusedObj){resetFocus();}
}

// ── Resize ───────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ── Animate ──────────────────────────────────────────────────────────
const clock=new THREE.Clock();
let _lastFrame=0;

function animate(){
  requestAnimationFrame(animate);
  const now=performance.now();
  if(isMobile&&now-_lastFrame<20)return;
  _lastFrame=now;

  const t=clock.getElapsedTime();
  const k=0.04;

  if(CAM.zooming){
    const elapsed=t-CAM.zoomStartTime;
    const rawT=Math.min(elapsed/CAM.zoomDuration,1.0);
    const et=easeOutExpo(rawT);
    CAM.x=CAM.zoomFrom.x+(CAM.zoomTo.x-CAM.zoomFrom.x)*et;
    CAM.y=CAM.zoomFrom.y+(CAM.zoomTo.y-CAM.zoomFrom.y)*et;
    CAM.z=CAM.zoomFrom.z+(CAM.zoomTo.z-CAM.zoomFrom.z)*et;
    CAM.yaw=CAM.zoomFrom.yaw+(CAM.zoomTo.yaw-CAM.zoomFrom.yaw)*et;
    CAM.pitch=CAM.zoomFrom.pitch+(CAM.zoomTo.pitch-CAM.zoomFrom.pitch)*et;
    if(rawT>=1.0){
      CAM.zooming=false;
      CAM.x=CAM.tx;CAM.y=CAM.ty;CAM.z=CAM.tz;
      CAM.yaw=CAM.tyaw;CAM.pitch=CAM.tpitch;
    }
  }else{
    CAM.x=lerp(CAM.x,CAM.tx,k);
    CAM.y=lerp(CAM.y,Math.max(CAM.ty,MIN_CAM_Y),k);
    CAM.z=lerp(CAM.z,CAM.tz,k);
    CAM.yaw=lerp(CAM.yaw,CAM.tyaw,k);
    CAM.pitch=lerp(CAM.pitch,CAM.tpitch,k);
  }

  const f=fwd();
  camera.position.set(CAM.x,CAM.y,CAM.z);
  camera.lookAt(CAM.x+f.x,CAM.y+f.y,CAM.z+f.z);

  pedestal.position.y=lerp(pedestal.position.y,pedTargetY,0.1);

  objects.forEach((o,i)=>{
    const isFocus=focusedObj===o;
    const baseFloorY=o.userData._baseY;
    if(isFocus){
      const pedTopY=pedestal.position.y+PED_H/2;
      if(pedestal.position.y<FLOOR_Y-PED_H/2+5){
        o.position.y=baseFloorY;
      }else{
        o.position.y=pedTopY+(baseFloorY-FLOOR_Y);
      }
    }else{
      o.position.y=baseFloorY+Math.sin(t*0.35+i*1.3)*4;
    }
    if(o.userData.type==='model'||o.userData.type==='note')o.rotation.y+=0.003;
  });

  renderer.render(scene,camera);
}

objects.forEach(o=>{o.userData._baseY=o.position.y;});

if('ontouchstart' in window)document.getElementById('hint').textContent='Drag · Pinch · Tap objects';

animate();
</script>
</body>
</html>
