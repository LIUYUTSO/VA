<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adam Liu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#e8e4dc;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif}
canvas{display:block;width:100vw;height:100vh;cursor:grab}
canvas:active{cursor:grabbing}
#hud{position:fixed;top:28px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:0.14em;color:rgba(40,30,20,0.4);text-transform:uppercase;pointer-events:none;user-select:none}
#hint{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:0.06em;color:rgba(40,30,20,0.25);pointer-events:none;user-select:none;transition:opacity 0.5s}
#homebtn{position:fixed;bottom:24px;right:24px;width:38px;height:38px;border-radius:50%;background:rgba(255,253,250,0.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid rgba(40,30,20,0.09);color:rgba(40,30,20,0.4);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.06);transition:color 0.2s;z-index:5}
#homebtn:hover{color:rgba(40,30,20,0.9)}
#card{position:fixed;top:0;right:0;width:40%;max-width:420px;height:100%;background:rgba(255,253,250,0.93);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border-left:0.5px solid rgba(40,30,20,0.07);padding:56px 40px 40px;opacity:0;pointer-events:none;transform:translateX(24px);transition:opacity 0.4s cubic-bezier(0.22,1,0.36,1),transform 0.4s cubic-bezier(0.22,1,0.36,1);display:flex;flex-direction:column;justify-content:center;box-shadow:-6px 0 28px rgba(0,0,0,0.04);z-index:4}
#card.show{opacity:1;pointer-events:auto;transform:translateX(0)}
#card-close{position:absolute;top:20px;right:20px;background:none;border:none;color:rgba(40,30,20,0.25);font-size:20px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:color 0.15s,background 0.15s}
#card-close:hover{color:rgba(40,30,20,0.8);background:rgba(40,30,20,0.06)}
#card-tag{font-size:10px;letter-spacing:0.12em;color:rgba(40,30,20,0.35);text-transform:uppercase;margin-bottom:14px}
#card-title{font-size:26px;font-weight:500;margin-bottom:6px;letter-spacing:-0.02em;color:#1a1410;line-height:1.2}
#card-date{font-size:12px;color:rgba(40,30,20,0.35);margin-bottom:20px;letter-spacing:0.04em}
#card-desc{font-size:14px;color:rgba(40,30,20,0.6);line-height:1.8}
@media(max-width:640px){
  #card{width:100%;max-width:none;height:auto;top:auto;bottom:0;border-left:none;border-top:0.5px solid rgba(40,30,20,0.07);padding:28px 24px 40px;transform:translateY(20px);justify-content:flex-start;border-radius:20px 20px 0 0}
  #card.show{transform:translateY(0)}
  #card-title{font-size:22px}
}
#loading{position:fixed;inset:0;background:#e8e4dc;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;transition:opacity 0.5s;z-index:20}
#loading.hide{opacity:0;pointer-events:none}
#loading-text{font-size:11px;letter-spacing:0.14em;color:rgba(40,30,20,0.35);text-transform:uppercase}
#loading-bar{width:100px;height:1px;background:rgba(40,30,20,0.12);overflow:hidden}
#loading-fill{height:100%;background:rgba(40,30,20,0.35);width:0%;transition:width 0.25s}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">Adam Liu</div>
<div id="hint">Left drag to pan · Scroll to dolly · Right drag to look</div>
<button id="homebtn" title="Overview">⌂</button>
<div id="card">
  <button id="card-close">×</button>
  <div id="card-tag"></div>
  <div id="card-title"></div>
  <div id="card-date"></div>
  <div id="card-desc"></div>
</div>
<div id="loading">
  <div id="loading-text">Loading</div>
  <div id="loading-bar"><div id="loading-fill"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>
<script>
const ITEMS=[
  {id:'m1',type:'model',title:'Tim Hortons Cup',date:'2024.11',desc:'Hand-modelled in Blender. My first attempt at beverage packaging.',color:0xc8452a,rough:0.4,metal:0.05,pos:[0,0,0]},
  {id:'m2',type:'model',title:'Raffle Ticket',date:'2025.01',desc:'A vintage-style raffle ticket. UV-unwrapped across a single wide texture.',color:0xd4a04a,rough:0.6,metal:0.0,pos:[320,0,80]},
  {id:'p1',type:'photo',title:'Calgary Winter',date:'2025.02',desc:'The Rockies from the east side. Still gets me every time.',color:0x8aacc8,pos:[-300,0,-160]},
  {id:'p2',type:'photo',title:'Workshop',date:'2024.12',desc:'Late night coding session. Next.js, Neon, GSAP.',color:0x9a8aba,pos:[160,0,-320]},
  {id:'v1',type:'video',title:'Blender Timelapse',date:'2025.03',desc:'Speed-modelling the ticket card.',color:0x5a9a7a,pos:[-180,0,260]},
  {id:'n1',type:'note',title:'Wabi-Sabi',date:'ongoing',desc:'侘寂 — beauty in imperfection.',color:0xb5a890,rough:0.85,metal:0.0,pos:[380,0,-60]},
  {id:'n2',type:'note',title:'IEC — Visitor Record',date:'2025.05',desc:'Waiting game. ~300 days. Calgary continues.',color:0x95a586,rough:0.7,metal:0.0,pos:[-340,0,40]},
  {id:'m3',type:'model',title:'Voyage Artifact No.1',date:'2024.10',desc:'3D-scanned travel collectible via Scaniverse.',color:0xba7a4a,rough:0.45,metal:0.15,pos:[60,0,280]},
];

const FLOOR_Y=-80, PED_H=100, MIN_CAM_Y=FLOOR_Y+150;
const CX=ITEMS.reduce((s,i)=>s+i.pos[0],0)/ITEMS.length;
const CZ=ITEMS.reduce((s,i)=>s+i.pos[2],0)/ITEMS.length;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const isMobile=window.innerWidth<=640;

function lookAngles(px,py,pz,lx,ly,lz){
  const dx=lx-px,dy=ly-py,dz=lz-pz;
  return{yaw:Math.atan2(-dx,-dz),pitch:Math.atan2(dy,Math.sqrt(dx*dx+dz*dz))};
}
function fwdVec(yaw,pitch){
  return new THREE.Vector3(-Math.sin(yaw)*Math.cos(pitch),Math.sin(pitch),-Math.cos(yaw)*Math.cos(pitch));
}
function rightVec(yaw){return new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));}

const HOME={x:CX,y:420,z:CZ+700};
const HOME_A=lookAngles(HOME.x,HOME.y,HOME.z,CX,FLOOR_Y+20,CZ);

const C={
  x:HOME.x,y:HOME.y,z:HOME.z,
  tx:HOME.x,ty:HOME.y,tz:HOME.z,
  yaw:HOME_A.yaw,pitch:HOME_A.pitch,
  tyaw:HOME_A.yaw,tpitch:HOME_A.pitch,
};

// ── easeOutExpo animation system ─────────────────────────────────────
function easeOutExpo(t){return t>=1?1:1-Math.pow(2,-10*t);}
const ANIM={active:false,t0:0,dur:1.2,from:{x:0,y:0,z:0,yaw:0,pitch:0},to:{x:0,y:0,z:0,yaw:0,pitch:0}};

function animateTo(tx,ty,tz,tyaw,tpitch,dur){
  ANIM.from={x:C.x,y:C.y,z:C.z,yaw:C.yaw,pitch:C.pitch};
  ANIM.to={x:tx,y:ty,z:tz,yaw:tyaw,pitch:tpitch};
  ANIM.t0=clock.getElapsedTime();
  ANIM.dur=dur||1.2;
  ANIM.active=true;
  C.tx=tx;C.ty=ty;C.tz=tz;C.tyaw=tyaw;C.tpitch=tpitch;
}
function cancelAnim(){ANIM.active=false;}

// ── Renderer ─────────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.0;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.physicallyCorrectLights=true;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0xe8e4dc);
scene.fog=new THREE.Fog(0xe8e4dc,900,2400);

const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,10,5000);

// ── HDRI ─────────────────────────────────────────────────────────────
const pmrem=new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
new THREE.RGBELoader().setDataType(THREE.UnsignedByteType)
  .load('https://cdn.jsdelivr.net/gh/pmndrs/drei-assets@master/hdri/studio_small_09_1k.hdr',
    tex=>{scene.environment=pmrem.fromEquirectangular(tex).texture;tex.dispose();pmrem.dispose();hideLoad();},
    xhr=>{document.getElementById('loading-fill').style.width=(xhr.loaded/xhr.total*100)+'%';},
    ()=>hideLoad());
function hideLoad(){setTimeout(()=>document.getElementById('loading').classList.add('hide'),200);}

// ── Lights ───────────────────────────────────────────────────────────
const sun=new THREE.DirectionalLight(0xfff0d8,2.5);
sun.position.set(300,500,200);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=sun.shadow.camera.bottom=-700;
sun.shadow.camera.right=sun.shadow.camera.top=700;
sun.shadow.camera.near=10;sun.shadow.camera.far=2000;
sun.shadow.radius=12;sun.shadow.bias=-0.0005;
scene.add(sun);
const fill=new THREE.DirectionalLight(0xc8d8e8,0.6);
fill.position.set(-200,300,-100);scene.add(fill);

// ── Floor ────────────────────────────────────────────────────────────
const floor=new THREE.Mesh(
  new THREE.PlaneGeometry(6000,6000),
  new THREE.MeshStandardMaterial({color:0xe8e4dc,roughness:0.85})
);
floor.rotation.x=-Math.PI/2;floor.position.y=FLOOR_Y;floor.receiveShadow=true;
scene.add(floor);

// ── Dust ─────────────────────────────────────────────────────────────
const dg=new THREE.BufferGeometry();
const dp=new Float32Array(400*3);
for(let i=0;i<400;i++){dp[i*3]=(Math.random()-0.5)*2000;dp[i*3+1]=Math.random()*500;dp[i*3+2]=(Math.random()-0.5)*1400;}
dg.setAttribute('position',new THREE.BufferAttribute(dp,3));
scene.add(new THREE.Points(dg,new THREE.PointsMaterial({color:0x9a8a70,size:1.3,sizeAttenuation:true,opacity:0.25,transparent:true})));

// ── Pedestal ─────────────────────────────────────────────────────────
const pedGeo=new THREE.BoxGeometry(80,PED_H,80);
const pedestal=new THREE.Mesh(pedGeo,new THREE.MeshStandardMaterial({color:0xf0ece4,roughness:0.45,envMapIntensity:0.5}));
pedestal.castShadow=true;pedestal.receiveShadow=true;
pedestal.position.y=FLOOR_Y-PED_H;
scene.add(pedestal);
pedestal.add(new THREE.LineSegments(new THREE.EdgesGeometry(pedGeo),new THREE.LineBasicMaterial({color:0xc8c0b4,opacity:0.3,transparent:true})));
let pedTargetY=FLOOR_Y-PED_H;

// ── Objects ──────────────────────────────────────────────────────────
const objects=[];
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();

function objOffset(t){return t==='model'?26:t==='note'?20:30;}

ITEMS.forEach(item=>{
  let mesh;
  const col=new THREE.Color(item.color);
  const mkMat=(r,m)=>new THREE.MeshStandardMaterial({color:col,roughness:r,metalness:m,envMapIntensity:1.0});

  if(item.type==='model'){
    const pts=[];
    for(let i=0;i<=24;i++){const t=i/24;pts.push(new THREE.Vector2(Math.sin(t*Math.PI)*22+6,t*52-26));}
    const geo=new THREE.LatheGeometry(pts,72);geo.computeVertexNormals();
    mesh=new THREE.Mesh(geo,mkMat(item.rough??0.4,item.metal??0.05));
  }else if(item.type==='photo'){
    mesh=new THREE.Mesh(new THREE.PlaneGeometry(88,60),mkMat(0.5,0));
    mesh.material.side=THREE.DoubleSide;
    const brd=new THREE.Mesh(new THREE.PlaneGeometry(94,66),new THREE.MeshStandardMaterial({color:0xfaf6ec,roughness:0.7,side:THREE.DoubleSide}));
    brd.position.z=-0.5;mesh.add(brd);
  }else if(item.type==='video'){
    mesh=new THREE.Mesh(new THREE.PlaneGeometry(96,60),mkMat(0.5,0));
    mesh.material.side=THREE.DoubleSide;
    const ring=new THREE.Mesh(new THREE.RingGeometry(9,12,48),new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.DoubleSide,opacity:0.5,transparent:true}));
    ring.position.z=1;mesh.add(ring);
  }else{
    const geo=new THREE.SphereGeometry(20,64,64);geo.computeVertexNormals();
    mesh=new THREE.Mesh(geo,mkMat(item.rough??0.6,item.metal??0));
  }

  const restY=FLOOR_Y+objOffset(item.type);
  mesh.position.set(item.pos[0],restY,item.pos[2]);
  mesh.rotation.y=Math.random()*Math.PI*2;
  mesh.castShadow=true;mesh.receiveShadow=true;
  mesh.userData={...item,restY};
  scene.add(mesh);objects.push(mesh);

  const blob=new THREE.Mesh(new THREE.CircleGeometry(30,32),new THREE.MeshBasicMaterial({color:0x000000,opacity:0.1,transparent:true,depthWrite:false}));
  blob.rotation.x=-Math.PI/2;blob.position.set(item.pos[0],FLOOR_Y+0.5,item.pos[2]);
  scene.add(blob);
});

const lmat=new THREE.LineBasicMaterial({color:0xb0a890,opacity:0.18,transparent:true});
for(let i=0;i<objects.length;i++)
  for(let j=i+1;j<objects.length;j++)
    if(objects[i].position.distanceTo(objects[j].position)<420)
      scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([objects[i].position.clone(),objects[j].position.clone()]),lmat));

// ── Focus ────────────────────────────────────────────────────────────
let focusedObj=null;

function focusOn(obj){
  focusedObj=obj;
  const p=obj.userData.pos;
  const liftedY=obj.userData.restY+PED_H;

  // Approach direction from current camera to object (horizontal)
  const dx=p[0]-C.x, dz=p[2]-C.z;
  const dist=Math.sqrt(dx*dx+dz*dz)||1;
  const nx=dx/dist, nz=dz/dist;

  const viewDist=300;
  const baseX=p[0]-nx*viewDist;
  const baseZ=p[2]-nz*viewDist;
  const ty=Math.max(liftedY+100,MIN_CAM_Y);

  // 60/40 viewport: shift camera right along perpendicular (-nz, nx)
  // Object projects to NDC x = -S/(viewDist·tan(hFov/2))
  // Target NDC x = -0.40 → centre of left 60% (card occupies right 40%)
  let tx=baseX, tz=baseZ;
  if(!isMobile){
    const hFov=2*Math.atan(Math.tan(camera.fov*Math.PI/360)*camera.aspect);
    const S=0.40*viewDist*Math.tan(hFov/2);
    tx=baseX+(-nz)*S;
    tz=baseZ+(nx)*S;
  }

  // Keep approach yaw so object stays at NDC x = -0.40 (NOT lookAngles from shifted pos)
  const approachYaw=Math.atan2(-nx,-nz);
  let finalYaw=approachYaw;
  while(finalYaw-C.yaw>Math.PI)finalYaw-=Math.PI*2;
  while(finalYaw-C.yaw<-Math.PI)finalYaw+=Math.PI*2;

  // Pitch: camera-space Z of object = viewDist (proven invariant of the shift)
  const finalPitch=clamp(Math.atan2(liftedY-ty,viewDist),-0.9,0.05);

  animateTo(tx,ty,tz,finalYaw,finalPitch,isMobile?0.9:1.2);

  pedestal.position.x=p[0];pedestal.position.z=p[2];
  pedTargetY=FLOOR_Y+PED_H/2;
  document.getElementById('hint').style.opacity='0';
  showCard(obj.userData);
}

function resetFocusUI(){
  focusedObj=null;
  pedTargetY=FLOOR_Y-PED_H;
  document.getElementById('hint').style.opacity='1';
  document.getElementById('card').classList.remove('show');
}

function goHome(){
  let finalYaw=HOME_A.yaw;
  while(finalYaw-C.yaw>Math.PI)finalYaw-=Math.PI*2;
  while(finalYaw-C.yaw<-Math.PI)finalYaw+=Math.PI*2;
  animateTo(HOME.x,HOME.y,HOME.z,finalYaw,HOME_A.pitch,isMobile?0.8:1.0);
  resetFocusUI();
}

// ── Card UI ──────────────────────────────────────────────────────────
const cardEl=document.getElementById('card');
document.getElementById('card-close').addEventListener('click',goHome);
document.getElementById('homebtn').addEventListener('click',goHome);

function showCard(item){
  const icons={model:'◎ model',photo:'▣ photo',video:'▶ video',note:'◆ note'};
  document.getElementById('card-tag').textContent=icons[item.type]||item.type;
  document.getElementById('card-title').textContent=item.title;
  document.getElementById('card-date').textContent=item.date;
  document.getElementById('card-desc').textContent=item.desc;
  cardEl.classList.add('show');
}

// ── Input ────────────────────────────────────────────────────────────
let btn=-1,pMx=0,pMy=0,dragDist=0;
canvas.addEventListener('mousedown',e=>{e.preventDefault();btn=e.button;pMx=e.clientX;pMy=e.clientY;dragDist=0;});
window.addEventListener('mouseup',()=>btn=-1);
window.addEventListener('mousemove',e=>{
  if(btn<0)return;
  const dx=e.clientX-pMx,dy=e.clientY-pMy;
  dragDist+=Math.abs(dx)+Math.abs(dy);
  cancelAnim();
  if(btn===0){
    const r=rightVec(C.yaw);const spd=0.5;
    C.tx-=r.x*dx*spd;C.tz-=r.z*dx*spd;
    C.ty=clamp(C.ty+dy*spd,MIN_CAM_Y,2000);
  }else{
    C.tyaw-=dx*0.003;C.tpitch=clamp(C.tpitch-dy*0.003,-1.0,0.1);
  }
  pMx=e.clientX;pMy=e.clientY;
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('wheel',e=>{
  e.preventDefault();cancelAnim();
  const f=fwdVec(C.yaw,C.pitch);const spd=0.7;
  C.tx-=f.x*e.deltaY*spd;
  C.ty=clamp(C.ty-f.y*e.deltaY*spd,MIN_CAM_Y,2000);
  C.tz-=f.z*e.deltaY*spd;
},{passive:false});

let lPin=0,tDist=0;
canvas.addEventListener('touchstart',e=>{e.preventDefault();tDist=0;
  if(e.touches.length===1){pMx=e.touches[0].clientX;pMy=e.touches[0].clientY;}
  if(e.touches.length===2)lPin=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();cancelAnim();
  if(e.touches.length===1){
    const dx=e.touches[0].clientX-pMx,dy=e.touches[0].clientY-pMy;
    tDist+=Math.abs(dx)+Math.abs(dy);
    C.tyaw-=dx*0.004;C.tpitch=clamp(C.tpitch-dy*0.004,-1.0,0.1);
    pMx=e.touches[0].clientX;pMy=e.touches[0].clientY;
  }
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const f=fwdVec(C.yaw,C.pitch);
    C.tx+=f.x*(d-lPin)*1.0;C.tz+=f.z*(d-lPin)*1.0;lPin=d;
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{
  if(e.changedTouches.length===1&&e.touches.length===0&&tDist<8)
    doClick(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
});
canvas.addEventListener('click',e=>{if(dragDist<5)doClick(e.clientX,e.clientY);});

function doClick(cx,cy){
  mouse.x=(cx/window.innerWidth)*2-1;
  mouse.y=-(cy/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(objects,true);
  if(hits.length){
    let o=hits[0].object;while(o&&!o.userData?.id)o=o.parent;
    if(o?.userData?.id){focusedObj===o?goHome():focusOn(o);}
  }else if(focusedObj){
    goHome();
  }
}

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

if('ontouchstart' in window)document.getElementById('hint').textContent='Drag to look · Pinch to move · Tap objects';

// ── Render loop ──────────────────────────────────────────────────────
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();

  if(ANIM.active){
    const rawT=Math.min((t-ANIM.t0)/ANIM.dur,1);
    const et=easeOutExpo(rawT);
    C.x=lerp(ANIM.from.x,ANIM.to.x,et);
    C.y=lerp(ANIM.from.y,ANIM.to.y,et);
    C.z=lerp(ANIM.from.z,ANIM.to.z,et);
    C.yaw=lerp(ANIM.from.yaw,ANIM.to.yaw,et);
    C.pitch=lerp(ANIM.from.pitch,ANIM.to.pitch,et);
    if(rawT>=1){ANIM.active=false;C.x=C.tx;C.y=C.ty;C.z=C.tz;C.yaw=C.tyaw;C.pitch=C.tpitch;}
  }else{
    const k=0.03;
    C.x=lerp(C.x,C.tx,k);
    C.y=lerp(C.y,Math.max(C.ty,MIN_CAM_Y),k);
    C.z=lerp(C.z,C.tz,k);
    C.yaw=lerp(C.yaw,C.tyaw,k);
    C.pitch=lerp(C.pitch,C.tpitch,k);
  }

  const f=fwdVec(C.yaw,C.pitch);
  camera.position.set(C.x,C.y,C.z);
  camera.lookAt(C.x+f.x*100,C.y+f.y*100,C.z+f.z*100);

  pedestal.position.y=lerp(pedestal.position.y,pedTargetY,0.06);
  const pedTopY=pedestal.position.y+PED_H/2;

  objects.forEach((o,i)=>{
    const restY=o.userData.restY;
    const isFocused=focusedObj===o;
    if(isFocused){
      const lift=Math.max(0,pedTopY-FLOOR_Y);
      o.position.y=restY+lift;
    }else{
      o.position.y=restY+Math.sin(t*0.35+i*1.3)*3.5;
    }
    if(o.userData.type==='model'||o.userData.type==='note')
      o.rotation.y+=isFocused?0.006:0.003;
  });

  renderer.render(scene,camera);
}

animate();
</script>
